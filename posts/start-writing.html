        <h1>第一篇博客：为什么我想开始写作</h1>
        <p>我想开始写作，是因为很多想法如果不被记录，很快就会变成模糊的感觉。</p>
        <p>博客不一定要宏大。它可以只是一个持续整理的地方：记录学到的东西、做过的项目、踩过的坑，以及某些当下还没有答案的问题。</p>
        <p>第一篇文章的意义，就是给这件事一个起点。之后的每一次更新，都可以在这个起点上再往前走一点。</p>

        <h1>我的学习系统：输入、整理和输出</h1>
        <p>学习系统不需要复杂。对我来说，它更像三个连续动作：输入、整理、输出。</p>
        <p>输入负责打开视野，整理负责建立结构，输出负责检验理解。只收藏而不整理，很快会变成信息堆积；只整理而不输出，又很难知道自己是否真正掌握。</p>
        <p>所以我希望这个博客也能成为输出的一部分，让学习留下清晰的路径。</p>

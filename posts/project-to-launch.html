        <h1>一个小项目从想法到上线</h1>
        <p>一个小项目最重要的不是一开始就做得完整，而是尽快把核心问题说清楚。</p>
        <p>我通常会先写下三件事：它解决什么问题、第一版必须包含什么、哪些东西可以晚一点再做。这样能避免一开始就陷入太多分支。</p>
        <p>上线之后，项目才真正开始接受现实反馈。那些反馈会告诉我，哪些设计只是想象，哪些功能真的有用。</p>

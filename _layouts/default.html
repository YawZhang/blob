<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}" />
    <style>
      :root {
        --bg: #fafafa;
        --text: #171717;
        --muted: #737373;
        --line: #e5e5e5;
        --surface: #ffffff;
        --green: #1f7a55;
        --shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
      }

      * { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
        letter-spacing: 0;
      }
      a { color: inherit; text-decoration: none; }
      .site-header {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 24px;
        min-height: 68px;
        padding: 14px clamp(20px, 5vw, 72px);
        background: rgba(250, 250, 250, 0.82);
        backdrop-filter: blur(18px);
        border-bottom: 1px solid rgba(229, 229, 229, 0.8);
      }
      .brand { font-size: 18px; font-weight: 800; }
      nav { display: flex; gap: 4px; overflow-x: auto; }
      nav a {
        padding: 9px 12px;
        border-radius: 8px;
        color: #525252;
        font-size: 14px;
        white-space: nowrap;
      }
      nav a.active, nav a:hover {
        background: #111;
        color: #fff;
      }
      main {
        max-width: 1180px;
        margin: 0 auto;
        padding: 42px clamp(20px, 4vw, 40px) 68px;
      }
      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1.08fr) minmax(320px, 0.92fr);
        gap: 28px;
        align-items: stretch;
      }
      .hero-copy {
        min-height: 440px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: clamp(36px, 5vw, 72px);
        border-radius: 16px;
        background: #111;
        color: #fff;
        box-shadow: var(--shadow);
      }
      .eyebrow {
        margin-bottom: 18px;
        color: #a7f3d0;
        font-size: 14px;
        font-weight: 700;
      }
      .hero h1 {
        margin: 0;
        max-width: 760px;
        font-size: clamp(46px, 7vw, 88px);
        line-height: 1.01;
        letter-spacing: 0;
      }
      .hero p {
        max-width: 660px;
        margin: 24px 0 0;
        color: #d4d4d4;
        font-size: 19px;
        line-height: 1.75;
      }
      .hero-side { display: grid; gap: 16px; }
      .stat-card, .about-card {
        padding: 24px;
        border-radius: 16px;
        background: var(--surface);
        border: 1px solid var(--line);
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04);
      }
      .stat-card strong {
        display: block;
        font-size: 44px;
        line-height: 1;
      }
      .stat-card span, .about-card p {
        color: var(--muted);
        line-height: 1.7;
      }
      .about-card h2 {
        margin: 0 0 12px;
        font-size: 24px;
      }
      .section-head {
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 18px;
        margin: 54px 0 18px;
      }
      .section-head h2 {
        margin: 0;
        font-size: 32px;
      }
      .section-head p {
        max-width: 560px;
        margin: 8px 0 0;
        color: var(--muted);
        line-height: 1.7;
      }
      .section-head a {
        color: var(--green);
        font-weight: 700;
        font-size: 14px;
      }
      .featured-grid {
        display: grid;
        grid-template-columns: 1.15fr 0.85fr;
        gap: 18px;
      }
      .post-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 18px;
      }
      .post-grid.single { grid-template-columns: 1fr; }
      .post-card {
        min-height: 100%;
        border-radius: 16px;
        overflow: hidden;
        background: var(--surface);
        border: 1px solid var(--line);
        box-shadow: 0 12px 34px rgba(15, 23, 42, 0.045);
        transition: transform .16s ease, box-shadow .16s ease;
      }
      .post-card:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow);
      }
      .post-card a {
        display: grid;
        min-height: 100%;
      }
      .post-card.large .thumb { min-height: 260px; }
      .thumb {
        min-height: 154px;
        display: flex;
        align-items: end;
        padding: 18px;
        background: linear-gradient(135deg, #111827, #1f7a55);
        color: #fff;
      }
      .thumb span {
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(255,255,255,0.18);
        font-size: 13px;
        font-weight: 700;
      }
      .thumb.ios { background: linear-gradient(135deg, #0f172a, #0f766e); }
      .thumb.learning { background: linear-gradient(135deg, #1f2937, #2563eb); }
      .thumb.project { background: linear-gradient(135deg, #18181b, #b45309); }
      .thumb.life { background: linear-gradient(135deg, #1f2937, #be123c); }
      .card-body {
        display: flex;
        flex-direction: column;
        padding: 22px;
      }
      .meta {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        color: var(--muted);
        font-size: 13px;
      }
      .card-body h2 {
        margin: 15px 0 10px;
        font-size: 24px;
        line-height: 1.25;
      }
      .card-body p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }
      .category-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
      }
      .category-card {
        min-height: 168px;
        padding: 22px;
        border-radius: 16px;
        background: var(--surface);
        border: 1px solid var(--line);
      }
      .category-card:hover { box-shadow: var(--shadow); }
      .category-card span { color: var(--muted); font-size: 14px; }
      .category-card strong {
        display: block;
        margin: 12px 0;
        font-size: 42px;
        line-height: 1;
      }
      .category-card p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }
      .page-title {
        padding: 56px;
        border-radius: 16px;
        background: var(--surface);
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
      }
      .page-title span {
        color: var(--green);
        font-weight: 800;
        font-size: 14px;
      }
      .page-title h1 {
        margin: 14px 0 16px;
        font-size: clamp(42px, 6vw, 72px);
        line-height: 1.05;
      }
      .page-title p {
        max-width: 720px;
        margin: 0;
        color: var(--muted);
        font-size: 19px;
        line-height: 1.7;
      }
      .article {
        max-width: 840px;
        margin: 0 auto;
        padding: 56px clamp(20px, 4vw, 56px);
        border-radius: 16px;
        background: var(--surface);
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
      }
      .post-page {
        max-width: 1180px;
      }
      .post-shell {
        display: grid;
        grid-template-columns: 220px minmax(0, 840px);
        gap: 32px;
        align-items: start;
        justify-content: center;
      }
      .toc {
        position: sticky;
        top: 92px;
        max-height: calc(100vh - 120px);
        overflow: auto;
        padding: 18px;
        border-radius: 14px;
        background: var(--surface);
        border: 1px solid var(--line);
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04);
      }
      .toc-title {
        margin: 0 0 10px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
      }
      .toc ol {
        display: grid;
        gap: 4px;
        margin: 0;
        padding: 0;
        list-style: none;
      }
      .toc a {
        display: block;
        padding: 7px 8px;
        border-radius: 8px;
        color: #525252;
        font-size: 13px;
        line-height: 1.45;
      }
      .toc a:hover,
      .toc a.active {
        background: #f1f5f9;
        color: var(--green);
      }
      .toc .toc-h3 a {
        padding-left: 18px;
        color: var(--muted);
      }
      .toc-mobile {
        display: none;
        margin: 28px 0 0;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: #fafafa;
      }
      .toc-mobile summary {
        cursor: pointer;
        padding: 14px 16px;
        color: #262626;
        font-weight: 700;
      }
      .toc-mobile[open] summary {
        border-bottom: 1px solid var(--line);
      }
      .toc-mobile .toc {
        position: static;
        max-height: none;
        overflow: visible;
        padding: 10px;
        border: 0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
      }
      .article-meta {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 22px;
        color: var(--muted);
        font-size: 14px;
      }
      .article h1 {
        margin: 0;
        font-size: clamp(40px, 6vw, 68px);
        line-height: 1.08;
      }
      .article .summary {
        margin: 20px 0 0;
        color: var(--muted);
        font-size: 20px;
        line-height: 1.65;
      }
      .article-body {
        margin-top: 42px;
        color: #303030;
        font-size: 18px;
        line-height: 1.9;
      }
      .article-body h2 {
        margin: 40px 0 12px;
        padding-top: 10px;
        font-size: 30px;
        line-height: 1.3;
      }
      .article-body h2 a {
        color: var(--green);
        border-bottom: 1px solid rgba(31, 122, 85, 0.32);
      }
      .article-body p { margin: 0 0 17px; }
      .article-body ul { margin: 0 0 24px; padding-left: 24px; }
      .article-body li { margin: 8px 0; }
      code {
        padding: 2px 6px;
        border-radius: 6px;
        background: #f1f5f9;
        color: #0f766e;
      }
      pre {
        margin: 20px 0 26px;
        padding: 18px;
        overflow-x: auto;
        border-radius: 12px;
        background: #0f172a;
        color: #e5e7eb;
      }
      pre code {
        padding: 0;
        background: transparent;
        color: inherit;
        font-size: 14px;
        line-height: 1.7;
      }
      .site-footer {
        max-width: 1180px;
        margin: 0 auto;
        padding: 28px clamp(20px, 4vw, 40px) 42px;
        display: flex;
        justify-content: space-between;
        gap: 20px;
        color: var(--muted);
        border-top: 1px solid var(--line);
        font-size: 14px;
      }
      .about-panel {
        display: grid;
        grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
        gap: 18px;
        margin-top: 18px;
      }
      .about-panel .about-card { min-height: 220px; }
      .about-card ul {
        margin: 12px 0 0;
        padding-left: 20px;
        color: var(--muted);
        line-height: 1.8;
      }
      @media (max-width: 940px) {
        .hero, .featured-grid { grid-template-columns: 1fr; }
        .post-grid, .category-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .about-panel { grid-template-columns: 1fr; }
        .post-shell { grid-template-columns: 1fr; }
        .toc-desktop { display: none; }
        .toc-mobile { display: block; }
      }
      @media (max-width: 660px) {
        .site-header {
          align-items: flex-start;
          flex-direction: column;
        }
        nav { width: 100%; }
        .hero-copy { min-height: 360px; }
        .post-grid, .category-grid { grid-template-columns: 1fr; }
        .page-title { padding: 30px; }
        .site-footer { flex-direction: column; }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ '/' | relative_url }}">Yaw Zhang</a>
      <nav aria-label="主要导航">
        <a class="{% if page.url == '/' %}active{% endif %}" href="{{ '/' | relative_url }}">首页</a>
        <a class="{% if page.url == '/posts/' or page.layout == 'post' %}active{% endif %}" href="{{ '/posts/' | relative_url }}">文章</a>
        <a class="{% if page.url contains '/categories/' %}active{% endif %}" href="{{ '/categories/' | relative_url }}">专栏</a>
        <a class="{% if page.url == '/about/' %}active{% endif %}" href="{{ '/about/' | relative_url }}">关于</a>
      </nav>
    </header>

    {{ content }}

    <footer class="site-footer">
      <span>Yaw Zhang</span>
      <span>Personal writing, iOS notes, projects and learning.</span>
    </footer>
  </body>
</html>

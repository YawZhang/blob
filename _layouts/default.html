<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}" />
    <style>
      :root {
        --bg: #fbfbfa;
        --ink: #171717;
        --muted: #696969;
        --line: #e7e5e1;
        --soft: #f2f1ef;
      }

      * { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
        line-height: 1.72;
      }
      a { color: inherit; text-decoration: none; }
      .wrap { width: min(760px, calc(100% - 40px)); margin: 0 auto; }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        padding: 28px 0;
        border-bottom: 1px solid var(--line);
      }
      .brand { font-size: 15px; font-weight: 700; }
      nav { display: flex; gap: 18px; color: var(--muted); font-size: 14px; }
      nav a:hover, .post-link:hover h2, .post-link:hover h3, .pill:hover, .category:hover { color: var(--ink); }
      .hero { padding: 92px 0 72px; }
      .kicker { margin: 0 0 18px; color: var(--muted); font-size: 14px; }
      h1 { max-width: 700px; margin: 0; font-size: clamp(42px, 8vw, 72px); font-weight: 760; line-height: 1.02; letter-spacing: 0; }
      .intro { max-width: 620px; margin: 28px 0 0; color: var(--muted); font-size: 18px; }
      section { padding: 46px 0; border-top: 1px solid var(--line); }
      .section-head { display: flex; align-items: baseline; justify-content: space-between; gap: 24px; margin-bottom: 18px; }
      .section-head h2 { margin: 0; font-size: 16px; font-weight: 760; }
      .section-note { margin: 0; color: var(--muted); font-size: 14px; }
      .posts { display: grid; gap: 0; }
      .post {
        display: grid;
        grid-template-columns: 112px minmax(0, 1fr);
        gap: 22px;
        padding: 24px 0;
        border-top: 1px solid var(--line);
      }
      .post:first-child { border-top: 0; }
      time, .category { color: var(--muted); font-size: 14px; }
      .category { display: inline-flex; width: fit-content; margin-bottom: 8px; }
      .post h2, .post h3 { margin: 0 0 8px; font-size: 20px; font-weight: 720; line-height: 1.35; }
      .post p, .about p { margin: 0; color: var(--muted); }
      .post-link { display: block; }
      .meta { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 30px;
        padding: 0 11px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--soft);
        color: var(--muted);
        font-size: 13px;
      }
      article.page { padding: 76px 0 72px; }
      article.page h1 { margin: 18px 0 24px; font-size: clamp(34px, 7vw, 58px); line-height: 1.08; }
      article.page h2 { margin: 42px 0 12px; font-size: 22px; line-height: 1.35; }
      article.page p { margin: 0 0 22px; color: #303030; font-size: 18px; }
      article.page ul { margin: 0 0 20px; padding-left: 20px; color: #303030; }
      article.page li + li { margin-top: 6px; }
      .back { display: inline-flex; margin-top: 34px; color: var(--muted); font-size: 14px; }
      footer { padding: 34px 0 54px; border-top: 1px solid var(--line); color: var(--muted); font-size: 14px; }

      @media (max-width: 640px) {
        .wrap { width: min(100% - 28px, 760px); }
        header { align-items: flex-start; flex-direction: column; gap: 10px; }
        .hero { padding: 64px 0 52px; }
        .post { grid-template-columns: 1fr; gap: 6px; }
        .section-head { align-items: flex-start; flex-direction: column; gap: 6px; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <a class="brand" href="{{ '/' | relative_url }}">Yaw Zhang</a>
        <nav aria-label="主要导航">
          <a href="{{ '/' | relative_url }}#posts">文章</a>
          <a href="{{ '/' | relative_url }}#categories">分类</a>
          <a href="{{ '/' | relative_url }}#about">关于</a>
          <a href="https://github.com/YawZhang" target="_blank" rel="noreferrer">GitHub</a>
        </nav>
      </header>

      {{ content }}

      <footer>© 2026 Yaw Zhang. Built with GitHub Pages.</footer>
    </div>
  </body>
</html>

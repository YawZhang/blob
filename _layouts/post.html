---
layout: default
---

<article class="page">
  <a class="category" href="{{ '/categories/' | append: page.category_slug | append: '/' | relative_url }}">{{ page.category }}</a>
  <h1>{{ page.title }}</h1>
  <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y.%m.%d" }}</time>

  {{ content }}

  <a class="back" href="{{ '/categories/' | append: page.category_slug | append: '/' | relative_url }}">返回{{ page.category }}专栏</a>
</article>
